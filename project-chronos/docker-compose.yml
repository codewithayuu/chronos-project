# ──────────────────────────────────────────────
# Project Chronos — docker-compose
# Single command: docker-compose up
# ──────────────────────────────────────────────

version: "3.8"

services:
  chronos-backend:
    build: .
    container_name: chronos-backend
    ports:
      - "${CHRONOS_PORT:-8000}:8000"
    environment:
      - CHRONOS_SPEED=${CHRONOS_SPEED:-60}
      - CHRONOS_LOOP=${CHRONOS_LOOP:-true}
      - CHRONOS_AUTO_REPLAY=${CHRONOS_AUTO_REPLAY:-true}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/system/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
